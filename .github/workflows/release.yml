name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-22.04
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref_name }}
      cancel-in-progress: false

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Pin checkout to workflow SHA
        run: |
          git reset --hard ${{ github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short

      - name: Semantic release
        id: release
        uses: python-semantic-release/python-semantic-release@v10.5.3
        with:
          config_file: releaserc.toml
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # The release job runs on protected main. Keep version stamping local
          # for the build artifacts, then tag the triggering commit without
          # pushing a release commit to main.
          commit: "false"
          tag: "true"
          push: "true"
          vcs_release: "true"
          git_committer_name: "github-actions"
          git_committer_email: "actions@users.noreply.github.com"

      - name: Install binary build dependencies
        if: steps.release.outputs.released == 'true'
        run: |
          python -m pip install -r requirements-build.txt

      - name: Build standalone CLI binary
        if: steps.release.outputs.released == 'true'
        run: |
          pyinstaller \
            --onefile \
            --name pygisceclient-linux-x86_64 \
            --distpath release-assets \
            --paths . \
            --collect-submodules gisce \
            packaging/pygisceclient_pyinstaller.py
          ./release-assets/pygisceclient-linux-x86_64 --help
          cd release-assets
          sha256sum pygisceclient-linux-x86_64 > pygisceclient-linux-x86_64.sha256

      - name: Verify GitHub release assets
        if: steps.release.outputs.released == 'true'
        run: |
          test -s dist/*.tar.gz
          test -s release-assets/pygisceclient-linux-x86_64
          test -s release-assets/pygisceclient-linux-x86_64.sha256
          ls -lh dist release-assets

      - name: Upload Python distributions and standalone binary to GitHub Release
        if: steps.release.outputs.released == 'true'
        uses: python-semantic-release/publish-action@v10.5.3
        with:
          config_file: releaserc.toml
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ steps.release.outputs.tag }}

      - name: Publish Python distribution to PyPI
        if: steps.release.outputs.released == 'true'
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
          PYPI_MASTER_TOKEN: ${{ secrets.PYPI_MASTER_TOKEN }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install twine==6.1.0
          export TWINE_USERNAME=__token__
          export TWINE_PASSWORD="${PYPI_TOKEN:-${PYPI_MASTER_TOKEN:-}}"
          if [ -z "${TWINE_PASSWORD}" ]; then
            echo "No PYPI_TOKEN or PYPI_MASTER_TOKEN configured; skipping PyPI publish"
            exit 0
          fi
          echo "::add-mask::${TWINE_PASSWORD}"
          twine upload --non-interactive --skip-existing dist/*
